<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - Studioflow</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: #0a0a0f; color: #e4e4ef; font-family: 'Inter', system-ui, sans-serif;
    }
    .container { text-align: center; padding: 40px; max-width: 420px; }
    .icon {
      width: 80px; height: 80px; border-radius: 20px; margin: 0 auto 24px;
      background: linear-gradient(135deg, #2dd4bf33, #818cf833);
      display: flex; align-items: center; justify-content: center;
    }
    .icon svg { width: 40px; height: 40px; stroke: #818cf8; fill: none; stroke-width: 1.5; }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
    p { font-size: 15px; color: #8888a0; line-height: 1.6; margin-bottom: 24px; }
    .btn {
      display: inline-flex; padding: 12px 28px; background: #818cf8; color: #fff;
      border: none; border-radius: 10px; font-size: 15px; font-weight: 600;
      cursor: pointer; text-decoration: none; gap: 8px; align-items: center;
    }
    .btn:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg viewBox="0 0 24 24"><path d="M1 1l22 22M16.72 11.06A10.94 10.94 0 0119 12.55M5 12.55a10.94 10.94 0 015.17-2.39M10.71 5.05A16 16 0 0122.56 9M1.42 9a15.91 15.91 0 014.7-2.88M8.53 16.11a6 6 0 016.95 0M12 20h.01"></path></svg>
    </div>
    <h1>You're offline</h1>
    <p>It looks like you've lost your internet connection. Some features may be unavailable until you reconnect.</p>
    <button class="btn" onclick="location.reload()">Try Again</button>
  </div>
</body>
</html>
